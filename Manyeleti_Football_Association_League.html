<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manyeleti Football Association</title>
    <style>
        body { font-family: Arial, sans-serif; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid black; padding: 10px; text-align: center; }
        th { background-color: #f4a261; }
    </style>
</head>
<body>

<h1>Manyeleti Football Association League Table</h1>
<table id="leagueTable">
    <thead>
        <tr>
            <th>Team</th>
            <th>Played</th>
            <th>Won</th>
            <th>Draw</th>
            <th>Lost</th>
            <th>Points</th>
            <th>Goals For</th>
            <th>Goals Against</th>
            <th>Goal Difference</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<h2>Fixtures & Results</h2>
<table id="fixturesTable">
    <thead>
        <tr>
            <th>Home Team</th>
            <th>Away Team</th>
            <th>Home Score</th>
            <th>Away Score</th>
            <th>Submit Result</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
    let teams = [
        "Gunga Sport", "Young Stars", "Napolo FC", "Majaha YA Vuva", "Tirhela FC", "Mondzweni Sports", "KD Stars", "Ocean Stars", 
        "Small Chiefs", "Appollo Rangers FC", "Xirhoberhobe", "Hubs", "Black Birds", "Shorty Youmg Star", "Athol Liver", "Skom Boys", 
        "Flying Birds", "Share Academy", "Stone Breakers", "Happy Boys"
    ].map(name => ({
        name, played: 0, won: 0, draw: 0, lost: 0, points: 0, goalsFor: 0, goalsAgainst: 0, goalDifference: 0
    }));

    let fixtures = [];

    function generateFixtures() {
        teams.forEach((homeTeam, i) => {
            teams.forEach((awayTeam, j) => {
                if (i !== j) {
                    fixtures.push({ home: homeTeam.name, away: awayTeam.name });
                }
            });
        });

        shuffleFixtures(); // Randomize the fixture order
    }

    function shuffleFixtures() {
        for (let i = fixtures.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [fixtures[i], fixtures[j]] = [fixtures[j], fixtures[i]];
        }
    }

    function renderFixtures() {
        let fixturesBody = document.querySelector("#fixturesTable tbody");
        fixturesBody.innerHTML = "";

        fixtures.forEach(match => {
            let row = `<tr>
                <td>${match.home}</td>
                <td>${match.away}</td>
                <td><input type="number" class="score-home"></td>
                <td><input type="number" class="score-away"></td>
                <td><button onclick="submitResult('${match.home}', '${match.away}', this)">Submit</button></td>
            </tr>`;
            fixturesBody.innerHTML += row;
        });
    }

    function submitResult(homeTeam, awayTeam, button) {
        let row = button.parentElement.parentElement;
        let homeScore = parseInt(row.querySelector(".score-home").value);
        let awayScore = parseInt(row.querySelector(".score-away").value);

        let home = teams.find(team => team.name === homeTeam);
        let away = teams.find(team => team.name === awayTeam);

        home.goalsFor += homeScore;
        away.goalsFor += awayScore;
        home.goalsAgainst += awayScore;
        away.goalsAgainst += homeScore;

        home.goalDifference = home.goalsFor - home.goalsAgainst;
        away.goalDifference = away.goalsFor - away.goalsAgainst;

        home.played++;
        away.played++;

        if (homeScore > awayScore) {
            home.won++; home.points += 3;
            away.lost++;
        } else if (homeScore < awayScore) {
            away.won++; away.points += 3;
            home.lost++;
        } else {
            home.draw++; away.draw++;
            home.points += 1;
            away.points += 1;
        }

        renderTable();
    }

    function renderTable() {
        let tableBody = document.querySelector("#leagueTable tbody");
        tableBody.innerHTML = "";

        teams.sort((a, b) => b.points - a.points || b.goalDifference - a.goalDifference);

        teams.forEach(team => {
            let row = `<tr>
                <td>${team.name}</td>
                <td>${team.played}</td>
                <td>${team.won}</td>
                <td>${team.draw}</td>
                <td>${team.lost}</td>
                <td>${team.points}</td>
                <td>${team.goalsFor}</td>
                <td>${team.goalsAgainst}</td>
                <td>${team.goalDifference}</td>
            </tr>`;
            tableBody.innerHTML += row;
        });
    }

    generateFixtures();
    renderFixtures();
    renderTable();
</script>

</body>
</html>
